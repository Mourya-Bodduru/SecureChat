services:
  # 1. Backend Service (Node.js Express + Socket.io)
  - type: web
    name: securechat-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false # You will enter this value manually in the Render dashboard
      - key: NODE_ENV
        value: production

  # 2. Frontend Service (Vite Static Site)
  - type: web
    name: securechat-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: securechat-backend
          envVarKey: RENDER_EXTERNAL_URL
